<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive web Page</title>

</head>
<body>

    <!-- Navbar -->
    <nav>

    <!-- Video -->
    <video controls>

            <th>1</th>
